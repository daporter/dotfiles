# Local sshd policy for leiden: key-only logins, home LAN only.
#
# Files in sshd_config.d/ are read in lexical order and, unlike most config
# formats, the *first* setting of a keyword wins. This file sorts before
# 99-archlinux.conf so its settings take precedence.

# No firewall filters this host (nftables is installed but disabled), so the
# access restriction lives here. USER@HOST patterns accept CIDR, and both
# halves must match — everything else is rejected before authentication.
AllowUsers david@192.168.178.0/24

# This host's IPv6 addresses are globally routable, and AllowUsers above only
# names an IPv4 range, so IPv6 clients could never authenticate anyway. Don't
# listen on IPv6 at all rather than offer a banner to the open internet.
AddressFamily inet

# Public keys only — no passwords, no keyboard-interactive, no root.
PermitRootLogin no
PasswordAuthentication no
KbdInteractiveAuthentication no
AuthenticationMethods publickey
