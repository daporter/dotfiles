[global]
   workgroup = WORKGROUP
   server string = %h server (Samba %v)
   server role = standalone server
   security = user
   passdb backend = tdbsam
   map to guest = never

   bind interfaces only = yes
   # By subnet, not interface name: the wired NIC's name is set by the kernel
   # fallback (see system/networkd/) and has changed once already, which
   # silently left smbd bound to loopback only.
   interfaces = lo 192.168.178.0/24
   hosts allow = 127. 192.168.178.
   hosts deny = 0.0.0.0/0

   server min protocol = SMB2
   smb encrypt = desired

   load printers = no
   printing = bsd
   printcap name = /dev/null
   disable spoolss = yes

   logging = file
   log file = /var/log/samba/log.%m
   max log size = 1000

[Photos]
   path = /mnt/media/photos
   valid users = david
   read only = no
   browsable = yes
   create mask = 0664
   directory mask = 0775

[Music]
   path = /mnt/media/music
   valid users = david
   read only = no
   browsable = yes
   create mask = 0664
   directory mask = 0775
